name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build
        env:
          VITE_SUPABASE_URL: "https://ajocakqhywxnzzusyydv.supabase.co"
          VITE_SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFqb2Nha3FoeXd4bnp6dXN5eWR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0NjA5NzIsImV4cCI6MjA4ODAzNjk3Mn0.jMwmg89KqarlMBSzU8l1buhLZ__kwMIZQRzUiBllOBs"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor CLI
        run: npm install @capacitor/cli @capacitor/android

      - name: Build APK
        run: |
          rm -rf android
          npx cap add android
          npx cap copy android
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
